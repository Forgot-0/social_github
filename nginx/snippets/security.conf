# Безопасные заголовки
add_header X-Frame-Options SAMEORIGIN always;
add_header X-Content-Type-Options nosniff always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Download-Options noopen always;
add_header X-Permitted-Cross-Domain-Policies none always;
# Content Security Policy — пример сбалансированной политики.
# Подстраивайте под реальное приложение: возможно, потребуется добавить домены CDN, analytics и т.д.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

# Включайте HSTS только если вы уверены, что HTTPS всегда доступен
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;