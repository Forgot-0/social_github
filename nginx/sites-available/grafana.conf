upstream grafana_backend {
    server grafana:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name grafana.windoweropu.store;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name grafana.windoweropu.store;

    ssl_certificate     /etc/letsencrypt/live/grafana.windoweropu.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.windoweropu.store/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    include /etc/nginx/snippets/security.conf;

    access_log  /var/log/nginx/grafana.access.log main;
    error_log   /var/log/nginx/grafana.error.log warn;

    location / {
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://grafana_backend;
    }
}