upstream app_backend {
    server app:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.windoweropu.store;

    # Перенаправляем на HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.windoweropu.store;

    ssl_certificate     /etc/letsencrypt/live/api.windoweropu.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.windoweropu.store/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    include /etc/nginx/snippets/security.conf;

    access_log  /var/log/nginx/api.access.log main;
    error_log   /var/log/nginx/api.error.log warn;

    # Общий прокси
    location / {
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://app_backend;
    }

    # Специальный лимит для загрузки документов
    location ~ ^/api/v1/universities/\d+/documents/upload$ {
        client_max_body_size 200M;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://app_backend;
    }

    # WebSocket / longpoll endpoint — пример для /api/v1/questions/
    # Важно: nginx не учитывает query-string при выборе location, но прокси передаст её дальше.
    location ^~ /api/v1/questions/ {
        # Отключаем буферизацию для стриминга
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / EventSource
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;


        # Дополнительные таймауты для долгих WS-соединений
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Передаём запрос в бэкенд
        proxy_pass http://app_backend;
    }

    # Пример (по желанию) метрик Prometheus — доступ только локальному мониторингу
    location /metrics {
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://app_backend;
        allow 127.0.0.1;
        deny all;
    }
}