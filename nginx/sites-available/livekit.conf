upstream livekit_upstream {
    server livekit:7880;
    keepalive 32;
}

server {
    listen 80;
    server_name livekit.windoweropu.store;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name livekit.windoweropu.store;

    ssl_certificate     /etc/letsencrypt/live/livekit.windoweropu.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.windoweropu.store/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    include /etc/nginx/snippets/security.conf;

    access_log  /var/log/nginx/livekit.access.log main;
    error_log   /var/log/nginx/livekit.error.log warn;

    client_max_body_size 10m;

    location / {
        proxy_pass http://livekit_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;

        proxy_buffering off;
        proxy_cache off;
    }
}