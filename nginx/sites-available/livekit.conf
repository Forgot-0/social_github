
upstream livekit_upstream {
    server livekit:7880;
    keepalive 16;
  }

server {
    listen 80;
    server_name grafana.incollab.ru;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name livekit.windoweropu.store;

    ssl_certificate /etc/letsencrypt/live/livekit.windoweropu.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.windoweropu.store/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    include /etc/nginx/snippets/security.conf;
    location / {
      proxy_pass http://livekit_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }