upstream minio_console_backend {
    server minio:9001;
    keepalive 16;
}

server {
    listen 80;
    server_name console.windoweropu.store;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name console.windoweropu.store;

    ssl_certificate     /etc/letsencrypt/live/console.windoweropu.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/console.windoweropu.store/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    include /etc/nginx/snippets/security.conf;

    access_log  /var/log/nginx/minio-console.access.log main;
    error_log   /var/log/nginx/minio-console.error.log warn;

    ignore_invalid_headers off;
    client_max_body_size 0;

    location / {
        proxy_pass http://minio_console_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
    }
}
