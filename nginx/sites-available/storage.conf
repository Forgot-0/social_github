upstream minio_api_backend {
    server minio:9000;
    keepalive 16;
}

upstream minio_console_backend {
    server minio:9001;
    keepalive 16;
}

server {
    listen 80;
    server_name storage.windoweropu.store;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name storage.windoweropu.store;

    ssl_certificate     /etc/letsencrypt/live/storage.windoweropu.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storage.windoweropu.store/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    include /etc/nginx/snippets/security.conf;

    access_log  /var/log/nginx/storage.access.log main;
    error_log   /var/log/nginx/storage.error.log warn;

    ignore_invalid_headers off;


    location / {
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://minio_api_backend;
    }

    location /console {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy true;

        real_ip_header X-Real-IP;

        proxy_connect_timeout 300;

        proxy_buffering off;
        proxy_request_buffering off;

        # To support websocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        chunked_transfer_encoding off;


        proxy_pass http://minio_console_backend;
    }
}