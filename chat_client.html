<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat WebSocket Client</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #messages {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: scroll;
            padding: 10px;
            margin-bottom: 10px;
        }
        input[type="text"] {
            width: 70%;
            padding: 5px;
        }
        button {
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <h1>Chat WebSocket Client</h1>
    <div>
        <label for="token">Token:</label>
        <input type="text" id="token" placeholder="Enter your JWT token">
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>
    <div id="messages"></div>
    <div>
        <input type="text" id="chatId" placeholder="Chat ID">
        <input type="text" id="message" placeholder="Message">
        <input type="text" id="messageId" placeholder="Message Id">
        <button onclick="sendMessage()">Send Message</button>
        <button onclick="markRead()">Mark as Read</button>
    </div>

    <script>
        let ws = null;

        function connect() {
            const token = document.getElementById('token').value;
            if (!token) {
                alert('Please enter a token');
                return;
            }
            ws = new WebSocket(`ws://localhost:8000/api/v1/chats/ws/?token=${token}`);

            ws.onopen = function(event) {
                log('Connected to WebSocket');
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                log(`Received: ${JSON.stringify(data, null, 2)}`);
            };

            ws.onclose = function(event) {
                log('Disconnected from WebSocket');
            };

            ws.onerror = function(error) {
                log('WebSocket error: ' + error);
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }

        function sendMessage() {
            const token = document.getElementById('token').value;
            const chatId = document.getElementById('chatId').value;
            const message = document.getElementById('message').value;
            if (!token || !chatId || !message) {
                alert('Please enter token, chat ID, and message');
                return;
            }
            fetch(`http://localhost:8000/api/v1/chats/${chatId}/messages/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ content: message, reply_to_id: null, message_type: "text" })
            })
            .then(response => response.json())
            .then(data => log('Message sent: ' + JSON.stringify(data)))
            .catch(error => log('Error sending message: ' + error));
        }

        function markRead() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Not connected');
                return;
            }
            const chatId = document.getElementById('chatId').value;
            const messageId = document.getElementById('messageId').value
            const event = {
                type: 'messages_read',
                chat_id: parseInt(chatId),
                payload: {
                    last_read_message_id: parseInt(messageId) // Replace with actual message ID
                }
            };
            ws.send(JSON.stringify(event));
            log('Sent mark as read');
        }

        function log(message) {
            const messages = document.getElementById('messages');
            messages.innerHTML += '<div>' + message + '</div>';
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
