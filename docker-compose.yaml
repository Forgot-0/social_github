services:
  app:
    build:
      context: .
      target: production
    container_name: app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PROMETHEUS_MULTIPROC_DIR: /prometheus
    tmpfs:
      - /prometheus
    command: >
      sh -c "
      rm -rf /prometheus/* &&
      exec gunicorn 'app.main:init_app()'
      -k uvicorn.workers.UvicornWorker
      -w 4
      -c gunicorn.conf.py
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
      --max-requests 10000
      --max-requests-jitter 1000
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "8124:8124"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./monitoring/clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - app-network

  consumers:
    build:
      context: .
      target: production
    container_name: consumers
    hostname: consumers
    env_file:
      - .env
    command: ["faststream", "run", "app.consumers:app", "--host", "0.0.0.0", "--port", "9002",  "--workers", "2"]
    depends_on:
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: minio
    command: server --console-address ":9001" /data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minio123}
      MINIO_API_CORS_ALLOW_ORIGIN: '*'
      MINIO_BROWSER_REDIRECT_URL: "https://console.windoweropu.store"
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
      MINIO_PROMETHEUS_JOB_ID: "minio"
      MINIO_REGION: "us-east-1"
      MINIO_BROWSER: "on"
      MINIO_DOMAIN: "storage.windoweropu.store"
      MINIO_STORAGE_CLASS_STANDARD: "EC:2"
      MINIO_STORAGE_CLASS_RRS: "EC:1"
      MINIO_COMPRESSION: "gzip"
      MINIO_COMPRESSION_EXTENSIONS: ".txt,.log,.json,.csv,.md"
      MINIO_COMPRESSION_MIME_TYPES: "text/*,application/json,application/xml"
      MINIO_MAX_CONNECTIONS: "1000"
      MINIO_WRITE_QUORUM: "writeQuorum"
      MINIO_READ_QUORUM: "readQuorum"
      MINIO_CACHE_DRIVES: ""
      MINIO_CACHE_EXCLUDE: ""
      MINIO_CACHE_QUOTA: "80"
      MINIO_CACHE_AFTER: "3"
      MINIO_CACHE_WATERMARK_LOW: "70"
      MINIO_CACHE_WATERMARK_HIGH: "80"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:18.3
    container_name: db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:7.2-alpine
    container_name: "redis"
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --hz 20
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    volumes:
      - redis-data:/data
    networks:
      - app-network

  queue_worker:
    build:
      context: .
      target: production
    container_name: queue_worker
    env_file:
      - .env
    command: ["taskiq", "worker", "app.tasks:broker", "--no-configure-logging"]
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  scheduler:
    build:
      context: .
      target: production
    container_name: scheduler
    env_file:
      - .env
    command: ["taskiq", "scheduler", "app.tasks:scheduler", "--no-configure-logging"]
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
      - kafka_secrets:/etc/kafka/secrets
    healthcheck:
      test: kafka-topics --bootstrap-server kafka:9092 --list
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - app-network

  migrations:
    build:
      context: .
      target: production
    container_name: migrations
    env_file:
      - .env
    command: ["sh", "-c", "alembic upgrade head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - app-network

volumes:
  postgres_data:
  redis-data:
  kafka_data:
  kafka_secrets:
  miniodata:
  clickhouse_data:


networks:
  app-network:
    external: true
