services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - grafana
      - minio
      - livekit
    networks:
      - app-network
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:v1.9.12
    container_name: livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    env_file:
      - .env
    environment:
      REDIS_HOST: redis:6379
      REDIS_PORT: "6379"
    expose:
      - "6789"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7880 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network
