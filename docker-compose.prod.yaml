services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - grafana
      - minio
    networks:
      - app-network

  livekit:
    image: livekit/livekit-server:latest
    container_name: mini_discord_livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    expose:
      - "7880"
      - "7881"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network


  coturn:
    image: coturn/coturn:4.6.2
    container_name: mini_discord_coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./infra/turn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]

    